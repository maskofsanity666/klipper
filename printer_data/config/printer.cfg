# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v3.0. To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" and USB communication.

# The "make flash" command does not work on the SKR mini E3. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR
# mini E3 with that SD card.

# See docs/Config_Reference.md for a description of parameters.
[include mainsail.cfg]

# --- Motion/jam detection ---
[filament_motion_sensor filament_motion]
switch_pin: ^PC15
detection_length: 10.0
extruder: extruder
pause_on_runout: True
event_delay: 3.0
pause_delay: 0.5
runout_gcode:
    M117 Filament jam or runout!
    M118 Filament motion loss detected
insert_gcode:
    M117 Filament moving

[delayed_gcode DISABLE_FILAMENT_SENSOR]
initial_duration: 1
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_motion ENABLE=1


#existing good

[screws_tilt_adjust]
screw1: 75, 42
screw1_name: front left screw
screw2: 245, 42
screw2_name: front right screw
screw3: 245, 212
screw3_name: rear right screw
screw4: 75, 212
screw4_name: rear left screw
horizontal_move_z: 10
speed: 50
screw_thread: CW-M3

[bltouch]
sensor_pin: ^PC14
control_pin: PA1
set_output_mode: 5V
pin_move_time: 0.675
stow_on_each_sample: true
pin_up_touch_mode_reports_triggered: false
x_offset: -51 # To the left of the nozzle
y_offset: -12 # Towards the front of the machine from the nozzle
#z_offset: 0
speed: 10.0
lift_speed: 10.0
samples: 1
sample_retract_dist: 3.0

[safe_z_home]
home_xy_position: 100, 100 # 51.2, 1 Change coordinates to the center of your print bed, Ender 3 V3, 235mm x 235mm, plus adjusted for BL Touch offset
speed: 200
z_hop: 10
z_hop_speed: 25

[force_move]
enable_force_move: True

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 10, 10 
mesh_max: 197, 219 # should be stepper_x: position_max - bltouch:x_offset rounded down to nearest int
mesh_pps: 2, 2
probe_count: 5,3
algorithm: bicubic
bicubic_tension: 0.2
fade_start: 1
fade_end: 10
fade_target: 0
adaptive_margin: 5

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: -4
position_min: -4
position_max: 249
homing_speed: 75

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: -7
position_min: -7
position_max: 232
homing_speed: 75

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 249
position_min: -3

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580 #no dual z stepper, change to 1.160 with dual 
stealthchop_threshold: 999999

[extruder]
max_extrude_only_distance: 100
min_extrude_temp: 0
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 24.4
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 250

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_Kp: 112.24
#pid_Ki: 21.92
#pid_Kd: 383.11
min_temp: 0
max_temp: 130

[heater_fan heatbreak_cooling_fan]
pin: PC7

[heater_fan controller_fan]
pin: PB15

[fan]
pin: PC6 #part cooling [dual blowers]
max_power: 1.0
kick_start_time: 0.5
off_below: 0.1
cycle_time: 0.015

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_56001800135031334B343920-if00

[printer]
kinematics: cartesian
max_velocity: 325
max_accel: 3000
max_z_velocity: 25
max_z_accel: 100

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

#[display]
#lcd_type: st7920
#cs_pin: EXP1_7
#sclk_pin: EXP1_6
#sid_pin: EXP1_8
#encoder_pins: ^EXP1_5, ^EXP1_3
#click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

#[input_shaper]
#shaper_freq_x: 87.8  
#shaper_type_x: 3hump_ei
#shaper_freq_y: 37.200
#shaper_type_y: mzv
 
#[virtual_sdcard]
#path: /home/david/printer_data/gcodes
#on_error_gcode: CANCEL_PRINT

